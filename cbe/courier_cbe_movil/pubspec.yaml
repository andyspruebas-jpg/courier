name: courier_cbe_movil
description: >
  Aplicación móvil de Courier Bolivian Express S.R.L. conectada con el backend Django REST Framework.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: "^3.7.0"

dependencies:
  flutter:
    sdk: flutter

  # --- 🔹 Núcleo / Estado / Red / Almacenamiento ---
  http: ^1.5.0
  provider: ^6.1.5
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.19.0
  connectivity_plus: ^6.1.5
  url_launcher: ^6.3.1
  path_provider: ^2.1.4              # Directorio persistente para la cola offline

  # --- 🗺️ Geolocalización y mapas ---
  google_maps_flutter: ^2.13.1
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  flutter_polyline_points: ^3.1.0    # Decodifica polylines de Google Directions
  permission_handler: ^11.3.1        # Manejo de permisos (ubicación, cámara, etc.)

  # --- 🛰️ Servicio en segundo plano (Android) ---
  flutter_background_service: ^5.0.4

  # --- 🔊 Texto a voz (navegación guiada) ---
  flutter_tts: ^4.0.2

  # --- 📸 Captura de imágenes y cámara ---
  image_picker: ^1.0.7

  # --- ✍️ Firma digital (confirmación de entrega) ---
  signature: ^5.5.0

  # --- 🔔 Notificaciones locales (avisos de nuevas asignaciones, sin Firebase) ---
  flutter_local_notifications: ^18.0.1

  # --- 🎨 UI / Animaciones / Fuentes ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  flutter_spinkit: ^5.2.2
  animations: ^2.0.11
  flutter_compass: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
