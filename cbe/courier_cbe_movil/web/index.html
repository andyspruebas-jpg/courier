<!DOCTYPE html>
<html>
  <head>
    <!--
      Si sirves tu aplicación Flutter Web en una subcarpeta,
      asegúrate de ajustar el valor del "base href".
      Ejemplo: <base href="/courier_cbe_movil/">
    -->
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Aplicación Courier Bolivian Express conectada a Django REST Framework.">

    <!-- 📱 Configuración iOS y PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Courier CBE Móvil">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- 🔸 Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <!-- 📜 Manifesto PWA -->
    <link rel="manifest" href="manifest.json">

    <title>Courier CBE Móvil</title>

    <!-- Google Maps se carga solo si maps-config.js define una llave válida. -->
    <script src="maps-config.js"></script>
    <script>
      (function () {
        function loadFlutter() {
          if (window.__cbeFlutterLoaded || !document.body) return;
          window.__cbeFlutterLoaded = true;
          const flutterScript = document.createElement("script");
          flutterScript.src = "flutter_bootstrap.js";
          flutterScript.async = true;
          document.body.appendChild(flutterScript);
        }

        function loadMaps() {
          const apiKey = window.CBE_GOOGLE_MAPS_API_KEY || "";
          if (!apiKey || apiKey.includes("%")) return;
          const script = document.createElement("script");
          script.src = "https://maps.googleapis.com/maps/api/js?key="
            + encodeURIComponent(apiKey)
            + "&loading=async";
          script.async = true;
          script.defer = true;
          document.head.appendChild(script);
        }

        window.addEventListener("DOMContentLoaded", function () {
          loadFlutter();
          loadMaps();
        }, { once: true });
      })();
    </script>

    <!-- ✅ Estilo opcional (fondo de carga) -->
    <style>
      body {
        background: linear-gradient(135deg, #0A0E1A 0%, #1A1F35 50%, #0A0E1A 100%);
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #flutter_container {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>

  <body>
    <!-- Contenedor del Flutter Web App -->
    <div id="flutter_container"></div>

  </body>
</html>
