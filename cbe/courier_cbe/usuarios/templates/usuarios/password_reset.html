<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña - CBE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --reset-bg: #09090b;
            --reset-surface: #202025;
            --reset-surface-2: #111116;
            --reset-border: #3f3f46;
            --reset-text: #fafafa;
            --reset-muted: #b6b6c2;
            --reset-primary: #6366f1;
            --reset-teal: #14b8a6;
            --reset-danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(99, 102, 241, .16), transparent 28%),
                radial-gradient(circle at 86% 78%, rgba(20, 184, 166, .10), transparent 24%),
                var(--reset-bg);
            color: var(--reset-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--reset-surface);
            padding: 3rem;
            border: 1px solid var(--reset-border);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.58);
            width: 100%;
            max-width: 460px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 4px;
            background: linear-gradient(90deg, var(--reset-primary), var(--reset-teal));
        }

        h2 {
            color: var(--reset-text);
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--reset-text);
            font-weight: 700;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid var(--reset-border);
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1rem;
            background: var(--reset-surface-2);
            color: var(--reset-text);
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--reset-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.18);
        }

        .errorlist {
            color: #fecaca;
            margin: 0 0 1rem 1rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: 0;
            text-align: center;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            background: var(--reset-primary);
            color: white;
        }
    </style>
</head>

<body>
    <main class="card">
        <h2>Restablecer contraseña</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <label for="{{ form.nueva_contrasena.id_for_label }}">Nueva contraseña</label>
            {{ form.nueva_contrasena }}
            {{ form.nueva_contrasena.errors }}

            <label for="{{ form.confirmar_contrasena.id_for_label }}">Confirmar contraseña</label>
            {{ form.confirmar_contrasena }}
            {{ form.confirmar_contrasena.errors }}

            <button class="btn" type="submit">Guardar nueva contraseña</button>
        </form>
    </main>
</body>

</html>
