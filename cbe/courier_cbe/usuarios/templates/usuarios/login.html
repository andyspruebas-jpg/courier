<script>
    if (window.location.protocol === "file:") {
        window.location.replace("http://127.0.0.1:8000/usuarios/login/");
    }
</script>
{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CBE Courier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --login-bg: #09090b;
            --login-surface: #17171b;
            --login-surface-2: #232329;
            --login-border: #3f3f46;
            --login-text: #fafafa;
            --login-muted: #b6b6c2;
            --login-primary: #6366f1;
            --login-primary-2: #818cf8;
            --login-teal: #14b8a6;
            --login-danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(99, 102, 241, .16), transparent 28%),
                radial-gradient(circle at 86% 78%, rgba(20, 184, 166, .10), transparent 24%),
                var(--login-bg);
            color: var(--login-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(99, 102, 241, 0.12);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 60%;
            left: 80%;
            animation-delay: 3s;
        }

        .particle:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 80%;
            left: 10%;
            animation-delay: 6s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.28;
            }

            50% {
                transform: translateY(-100px) rotate(180deg);
                opacity: 0.5;
            }
        }

        .login-container {
            background: #202025;
            padding: 3rem;
            border: 1px solid var(--login-border);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.58);
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            animation: slideIn 0.6s ease-out;
            overflow: hidden;
        }

        .login-container::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 4px;
            background: linear-gradient(90deg, var(--login-primary), var(--login-teal));
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .logo h1 {
            font-size: 2.5rem;
            color: var(--login-primary-2);
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: var(--login-muted);
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .form-title {
            font-size: 1.8rem;
            color: var(--login-text);
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--login-text);
            font-weight: 700;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: var(--login-muted);
            transition: color 0.3s;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            border: 2px solid var(--login-border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #09090b;
            color: var(--login-text);
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: #8c8c96;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--login-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.18);
            background: #1f1f26;
        }

        input[type="email"]:focus+.input-icon,
        input[type="password"]:focus+.input-icon {
            color: var(--login-primary-2);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--login-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            background: #4f46e5;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.28);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .forgot-password {
            text-align: center;
            margin-top: 1.5rem;
        }

        .forgot-password a {
            color: var(--login-primary-2);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .forgot-password a:hover {
            color: var(--login-teal);
            text-decoration: underline;
        }

        .error-message {
            background: rgba(239, 68, 68, .12);
            color: #fecaca;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--login-danger);
            animation: shake 0.5s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            margin-top: 1rem;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
        }

        .checkbox-wrapper label {
            color: var(--login-muted);
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 2rem;
            }

            .form-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="login-container">
        <div class="logo">
            <h1>🚚 CBE</h1>
            <p>Sistema de Gestión de Courier</p>
        </div>

        <h2 class="form-title">Iniciar sesión</h2>

        {% if messages %}
        {% for message in messages %}
        <div class="error-message">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_email">Correo electrónico</label>
                <div class="input-wrapper">
                    <input type="email" name="email" id="id_email" placeholder="admin@cbe.com" required autofocus>
                    <span class="input-icon">📧</span>
                </div>
            </div>

            <div class="form-group">
                <label for="id_contrasena">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" name="contrasena" id="id_contrasena" placeholder="••••••••" required>
                    <span class="input-icon">🔒</span>
                </div>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Recordarme en este dispositivo</label>
            </div>

            <button type="submit" class="btn-login">Iniciar sesión</button>
        </form>

        <div class="forgot-password">
            <a href="{% url 'usuarios:password_reset_request' %}">¿Olvidaste tu contraseña?</a>
        </div>
    </div>
</body>

</html>
