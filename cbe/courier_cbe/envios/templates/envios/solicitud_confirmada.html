{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Registrada - CBE</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <link rel="stylesheet" href="{% static 'css/easy.css' %}?v=5">
</head>
<body>
    {% include 'includes/navbar.html' %}
    <main class="easy-page">
        <section class="success-panel">
            <p class="eyebrow">Solicitud registrada</p>
            <h1>{{ envio.numero_seguimiento }}</h1>
            <p>Estado actual: <strong>{{ envio.estado_publico }}</strong></p>
            <div class="quick-actions">
                <a class="btn btn-success" href="{% url 'envios:seguimiento_detalle' envio.numero_seguimiento %}">Ver seguimiento</a>
                <a class="btn btn-primary" href="{% url 'envios:ver_envio' envio.id %}">Imprimir guía</a>
                <a class="btn btn-secondary" href="{% url 'envios:solicitar_envio' %}">Nueva solicitud</a>
            </div>
        </section>
    </main>
</body>
</html>
