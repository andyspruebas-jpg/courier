{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Zona - CBE</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 50%, #0a0e1a 100%);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(239, 68, 68, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 0.8;
            }
        }

        .modal-container {
            position: relative;
            z-index: 1;
            max-width: 550px;
            width: 90%;
            animation: modalAppear 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-card {
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 2rem;
            padding: 3rem;
            box-shadow:
                0 20px 60px rgba(239, 68, 68, 0.3),
                0 0 0 1px rgba(239, 68, 68, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .modal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 2rem;
            padding: 2px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #ef4444 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            opacity: 0.6;
            animation: borderRotate 3s linear infinite;
        }

        @keyframes borderRotate {

            0%,
            100% {
                background: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #ef4444 100%);
            }

            50% {
                background: linear-gradient(135deg, #dc2626 0%, #ef4444 50%, #dc2626 100%);
            }
        }

        .modal-content {
            position: relative;
            z-index: 1;
        }

        .warning-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            animation: pulse-icon 2s ease-in-out infinite;
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse-icon {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        h1 {
            font-size: 1.875rem;
            background: linear-gradient(135deg, #fca5a5 0%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 1.5rem 0;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .zona-info {
            background: rgba(39, 39, 42, 0.5);
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .zona-info p {
            margin: 0.75rem 0;
            color: #e4e4e7;
            font-size: 1rem;
        }

        .zona-info strong {
            color: #fca5a5;
            font-weight: 700;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 1rem 2rem;
            border: none;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            min-width: 150px;
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.6);
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: rgba(71, 85, 105, 0.8);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cancel:hover {
            background: rgba(51, 65, 85, 0.9);
            transform: translateY(-2px);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        @media (max-width: 640px) {
            .modal-card {
                padding: 2rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="modal-container">
        <div class="modal-card">
            <div class="modal-content">
                <div class="warning-icon">⚠️</div>

                <h1>¿Estás seguro de que quieres eliminar esta zona?</h1>

                <div class="zona-info">
                    <p><strong>Nombre de la Zona:</strong> {{ zona.nombre }}</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="button-group">
                        <button type="submit" class="btn btn-delete">
                            ✕ Eliminar Zona
                        </button>
                        <a href="{% url 'zonas:lista_zonas' %}" class="btn btn-cancel">
                            ← Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
